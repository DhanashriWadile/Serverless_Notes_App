<script>
const API = "https://h5hfnnv89i.execute-api.ap-south-1.amazonaws.com/prod"; // replace this

let userEmail = "";
let token = "";

// ✅ REGISTER
async function register() {
  try {
    let res = await fetch(API + "/register", {
      method: "POST",
      body: JSON.stringify({
        email: email.value,
        password: password.value
      })
    });

    let data = await res.json();

    if (res.status === 200) {
      alert("✅ Registered successfully");
    } else {
      alert("❌ " + data.message);
    }

  } catch (err) {
    alert("Error: " + err);
  }
}

// ✅ LOGIN
async function login() {
  try {
    let res = await fetch(API + "/login", {
      method: "POST",
      body: JSON.stringify({
        email: email.value,
        password: password.value
      })
    });

    let data = await res.json();

    if (res.status === 200) {
      alert("✅ Login successful");

      token = data.token;        // store JWT
      userEmail = email.value;   // store email

    } else {
      alert("❌ " + data.message);
    }

  } catch (err) {
    alert("Error: " + err);
  }
}

// ✅ ADD NOTE
async function addNote() {
  if (!token) {
    alert("⚠️ Please login first");
    return;
  }

  try {
    let res = await fetch(API + "/add-note", {
      method: "POST",
      headers: {
        "Authorization": token
      },
      body: JSON.stringify({
        title: title.value,
        content: content.value
      })
    });

    let data = await res.json();

    if (res.status === 200) {
      alert("✅ Note added");
    } else {
      alert("❌ " + data.message);
    }

  } catch (err) {
    alert("Error: " + err);
  }
}

// ✅ VIEW NOTES
async function getNotes() {
  if (!token) {
    alert("⚠️ Please login first");
    return;
  }

  try {
    let res = await fetch(API + "/get-notes", {
      method: "GET",
      headers: {
        "Authorization": token
      }
    });

    let data = await res.json();

    let html = "";

    if (data.length === 0) {
      html = "<p>No notes found</p>";
    } else {
      data.forEach(n => {
        html += `<p><b>${n.title}</b>: ${n.content}</p>`;
      });
    }

    notes.innerHTML = html;

  } catch (err) {
    alert("Error: " + err);
  }
}
</script>
